<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message envoyé — Kevin Stylist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --noir: #1A1A1A; --blanc: #FAFAF8; --gris: #B0B0B0;
      --creme: #F4F1EC; --taupe: #9E9187;
      --cormorant: 'Cormorant Garamond', serif;
      --montserrat: 'Montserrat', sans-serif;
    }
    body {
      background: var(--noir); color: var(--blanc);
      font-family: var(--montserrat); font-weight: 300;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .wrap { max-width: 500px; }
    .icon { font-family: var(--cormorant); font-size: 72px; font-style: italic; font-weight: 300; color: var(--taupe); margin-bottom: 32px; line-height: 1; }
    h1 { font-family: var(--cormorant); font-size: clamp(42px, 6vw, 64px); font-weight: 300; line-height: 1.1; margin-bottom: 20px; }
    h1 em { font-style: italic; color: var(--creme); }
    p { font-size: 12px; color: var(--gris); line-height: 2; letter-spacing: 0.04em; margin-bottom: 48px; }
    .btn { display: inline-flex; align-items: center; gap: 14px; padding: 16px 40px; background: var(--blanc); color: var(--noir); font-family: var(--montserrat); font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: background 0.3s; }
    .btn:hover { background: var(--creme); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">✦</div>
    <h1>Message<br><em>reçu.</em></h1>
    <p>Merci de m'avoir écrit. Je te réponds personnellement dans les plus brefs délais.</p>
    <a href="accueil.html" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
